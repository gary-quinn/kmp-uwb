name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_url: ${{ steps.release.outputs.release_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          VERSION: ${{ github.ref_name }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build XCFramework
        run: ./gradlew assembleXCFramework
        env:
          VERSION: ${{ github.ref_name }}

      - name: Zip XCFramework
        run: |
          cd build/XCFrameworks/release
          zip -r KmpUwb.xcframework.zip KmpUwb.xcframework

      - name: Create release and upload XCFramework
        id: release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || true
          gh release upload ${{ github.ref_name }} \
            build/XCFrameworks/release/KmpUwb.xcframework.zip \
            --clobber
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift
        run: |
          VERSION=${{ github.ref_name }}
          CHECKSUM=$(swift package compute-checksum build/XCFrameworks/release/KmpUwb.xcframework.zip)
          git fetch origin main
          git checkout main
          cat > Package.swift << SWIFT
          // swift-tools-version:5.9
          import PackageDescription

          let package = Package(
              name: "KmpUwb",
              platforms: [.iOS(.v15)],
              products: [
                  .library(name: "KmpUwb", targets: ["KmpUwb"]),
              ],
              targets: [
                  .binaryTarget(
                      name: "KmpUwb",
                      url: "https://github.com/gary-quinn/kmp-uwb/releases/download/${VERSION}/KmpUwb.xcframework.zip",
                      checksum: "${CHECKSUM}"
                  ),
              ]
          )
          SWIFT
          git config user.email "gary@atruedev.com"
          git config user.name "Gary Quinn"
          git add Package.swift
          git diff --cached --quiet || git commit -m "update Package.swift for ${VERSION}"
          git push origin main

  deploy-api-docs:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Generate API docs (Dokka)
        run: ./gradlew dokkaGenerate
        env:
          VERSION: ${{ github.ref_name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: build/dokka/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  update-docs:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Get release metadata
        id: meta
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ needs.publish.outputs.tag }}$" | head -1)
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog entries from merged PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/generate-changelog.sh "${{ steps.meta.outputs.prev_tag }}" "${{ needs.publish.outputs.tag }}"

      - name: Update README.md
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          sed -i -E "s|implementation\(\"com\.atruedev:kmp-uwb(-[a-z]+)?:[^\"]*\"\)|implementation(\"com.atruedev:kmp-uwb\1:$VERSION\")|g" README.md

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          TAG="${{ needs.publish.outputs.tag }}"
          PREV_TAG="${{ steps.meta.outputs.prev_tag }}"
          DATE="${{ steps.meta.outputs.date }}"
          ENTRIES=$(cat /tmp/changelog_entries.txt)

          awk -v version="$VERSION" -v date="$DATE" -v entries="$ENTRIES" '
          /^## \[Unreleased\]/ {
            print "## [Unreleased]"
            print ""
            print "_Changes on `main` that have not yet been tagged for release._"
            print ""
            print "---"
            print ""
            print "## [" version "] - " date
            print entries
            found = 1
            next
          }
          found && /^_Changes on `main` that have not yet been tagged for release._$/ { next }
          { print }
          ' CHANGELOG.md > /tmp/changelog_new.md
          mv /tmp/changelog_new.md CHANGELOG.md

          sed -i "s|\[Unreleased\]: \(.*\)/compare/.*\.\.\.HEAD|[Unreleased]: \1/compare/$TAG...HEAD|" CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            sed -i "/^\[Unreleased\]:.*$/a [$VERSION]: https://github.com/gary-quinn/kmp-uwb/compare/$PREV_TAG...$TAG" CHANGELOG.md
          fi

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: "docs: update docs for v${{ needs.publish.outputs.version }}"
          title: "docs: update docs for v${{ needs.publish.outputs.version }}"
          body: |
            Automated PR to update project docs with the new release version.

            **Updated files:**
            - `README.md` — dependency version
            - `CHANGELOG.md` — auto-generated entries from merged PRs

            Release: ${{ needs.publish.outputs.release_url }}
          branch: update-docs-${{ needs.publish.outputs.version }}
          base: main
          delete-branch: true

      - name: Auto-approve and merge PR
        if: steps.create-pr.outputs.pull-request-number
        run: |
          gh pr review --approve "${{ steps.create-pr.outputs.pull-request-url }}"
          gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-url }}"
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
